version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: loanlens_postgres
    environment:
      POSTGRES_USER: loanlens
      POSTGRES_PASSWORD: loanlens_pass
      POSTGRES_DB: loanlens_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: loanlens_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
